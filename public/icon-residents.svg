<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#8B5CF6" opacity="0.1"/>

  <!-- Building outline -->
  <rect x="14" y="16" width="36" height="40" rx="2" fill="#8B5CF6"/>
  <rect x="16" y="18" width="32" height="36" rx="1" fill="#fff"/>

  <!-- Building floors (windows grid) -->
  <!-- Floor 5 -->
  <rect x="20" y="20" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.3"/>
  <rect x="29" y="20" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.3"/>
  <rect x="38" y="20" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.3"/>

  <!-- Floor 4 -->
  <rect x="20" y="27" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.4"/>
  <rect x="29" y="27" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.4"/>
  <rect x="38" y="27" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.4"/>

  <!-- Floor 3 -->
  <rect x="20" y="34" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.5"/>
  <rect x="29" y="34" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.5"/>
  <rect x="38" y="34" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.5"/>

  <!-- Floor 2 -->
  <rect x="20" y="41" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.6"/>
  <rect x="29" y="41" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.6"/>
  <rect x="38" y="41" width="6" height="5" rx="0.5" fill="#8B5CF6" opacity="0.6"/>

  <!-- Ground floor / Entrance -->
  <rect x="26" y="48" width="12" height="6" rx="0.5" fill="#8B5CF6"/>

  <!-- People icon overlay -->
  <circle cx="50" cy="48" r="9" fill="#EC4899"/>

  <!-- Two people silhouettes -->
  <!-- Person 1 -->
  <circle cx="47" cy="46" r="2" fill="white"/>
  <path d="M 47 48 Q 45 50 45 52 L 49 52 Q 49 50 47 48" fill="white"/>

  <!-- Person 2 -->
  <circle cx="53" cy="46" r="2" fill="white"/>
  <path d="M 53 48 Q 51 50 51 52 L 55 52 Q 55 50 53 48" fill="white"/>
</svg>
