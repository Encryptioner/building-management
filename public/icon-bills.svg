<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#iconGradient)"/>

  <!-- Building Icon -->
  <!-- Base building structure -->
  <rect x="38" y="45" width="52" height="50" rx="2" fill="#ffffff" opacity="0.95"/>

  <!-- Windows - 3 columns, 4 rows -->
  <!-- Row 1 -->
  <rect x="44" y="52" width="8" height="7" rx="1" fill="#2563eb"/>
  <rect x="60" y="52" width="8" height="7" rx="1" fill="#2563eb"/>
  <rect x="76" y="52" width="8" height="7" rx="1" fill="#2563eb"/>

  <!-- Row 2 -->
  <rect x="44" y="63" width="8" height="7" rx="1" fill="#2563eb"/>
  <rect x="60" y="63" width="8" height="7" rx="1" fill="#2563eb"/>
  <rect x="76" y="63" width="8" height="7" rx="1" fill="#2563eb"/>

  <!-- Row 3 -->
  <rect x="44" y="74" width="8" height="7" rx="1" fill="#2563eb"/>
  <rect x="60" y="74" width="8" height="7" rx="1" fill="#2563eb"/>
  <rect x="76" y="74" width="8" height="7" rx="1" fill="#2563eb"/>

  <!-- Door (bottom center) -->
  <rect x="58" y="85" width="12" height="10" rx="1" fill="#7c3aed"/>
</svg>
